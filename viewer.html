<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0A1929">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Дорога к 70 — Прогресс</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy-deep: #0A1929;
  --navy: #11233E;
  --navy-darker: #060F1C;
  --cream: #F5EFE6;
  --cream-2: #B8B5AC;
  --cream-3: #8A8780;
  --gold: #D4B886;
  --surface-1: rgba(245, 239, 230, 0.035);
  --border-1: rgba(245, 239, 230, 0.12);
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --safe-top: env(safe-area-inset-top, 0);
  --safe-bottom: env(safe-area-inset-bottom, 0);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
html, body {
  margin: 0; padding: 0;
  background: radial-gradient(ellipse at top, var(--navy) 0%, var(--navy-deep) 60%, var(--navy-darker) 100%);
  color: var(--cream);
  font-family: 'Inter', -apple-system, sans-serif;
  font-weight: 300;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
}
.view {
  max-width: 520px;
  margin: 0 auto;
  padding: calc(2.5rem + var(--safe-top)) 1.5rem calc(2rem + var(--safe-bottom));
}
.header { text-align: center; margin-bottom: 2.5rem; }
.brand {
  font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase;
  color: var(--cream-3); margin-bottom: 1rem;
}
.title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300; font-size: 2.5rem; margin: 0;
  letter-spacing: 0.01em;
}
.divider { width: 32px; height: 0.5px; background: var(--cream-2); margin: 1rem auto; opacity: 0.4; }
.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--cream-2);
  font-size: 1rem;
  font-weight: 300;
}
.weight-block { text-align: center; margin: 2.5rem 0; }
.weight-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 5.5rem;
  font-weight: 300;
  line-height: 0.95;
  color: var(--cream);
}
.weight-unit {
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--cream-3);
  margin-top: 0.6rem;
}
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
  margin-bottom: 2rem;
}
.stat {
  padding: 1rem 0.5rem;
  background: var(--surface-1);
  border: 0.5px solid var(--border-1);
  border-radius: 2px;
  text-align: center;
}
.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 400;
  color: var(--cream);
  line-height: 1;
}
.stat-value.accent { color: var(--gold); }
.stat-label {
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cream-3);
  margin-top: 0.5rem;
}
.section-label {
  font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--cream-3); margin: 2rem 0 0.85rem;
}
.chart-wrap {
  padding: 1.25rem 0.5rem;
  background: var(--surface-1);
  border: 0.5px solid var(--border-1);
  border-radius: 2px;
}
.chart-wrap svg { width: 100%; height: auto; display: block; }
.message {
  margin-top: 2.5rem;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem;
  color: var(--cream-2);
  font-style: italic;
  font-weight: 300;
  line-height: 1.5;
}
.updated {
  margin-top: 3rem;
  text-align: center;
  font-size: 0.55rem;
  color: rgba(184, 181, 172, 0.4);
  letter-spacing: 0.3em;
  text-transform: uppercase;
}
.empty {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--cream-3);
}
.empty-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  color: var(--cream);
  margin-bottom: 1rem;
}
.badges-row {
  display: flex; flex-wrap: wrap; gap: 0.4rem;
  justify-content: center;
}
.badge-mini {
  padding: 0.4rem 0.65rem;
  font-size: 0.65rem;
  background: rgba(212, 184, 134, 0.12);
  border: 0.5px solid rgba(212, 184, 134, 0.3);
  border-radius: 2px;
  color: var(--gold);
  letter-spacing: 0.05em;
}
</style>
</head>
<body>
<div class="view" id="view">
  <div class="empty">
    <div class="empty-title">Дорога к 70</div>
    <div>Ссылка пустая. Открой её из сообщения от Donijoun.</div>
  </div>
</div>

<script>
const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];
const LEVEL_NAMES = ['На старте','Первый шаг','Подъём','Четверть пути','Половина пути','Перевал','На спуске','Финишная прямая','Близко к цели','У вершины'];

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function decodeFragment() {
  const frag = location.hash.slice(1);
  if (!frag) return null;
  try {
    // URL-safe base64 → bytes → string
    let b64 = frag.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const text = new TextDecoder().decode(bytes);
    return JSON.parse(text);
  } catch (e) {
    console.error('decode failed', e);
    return null;
  }
}

function render(data) {
  const w = data.w;
  const lost = data.lost || 0;
  const streak = data.streak || 0;
  const level = data.level || 1;
  const history = data.h || [];
  const badges = data.b || [];
  const target = data.target || 70;
  const start = data.start || 85;
  const updated = data.u ? new Date(data.u) : new Date();

  let msg;
  if (lost >= 10) msg = '— уже почти на финише —';
  else if (lost >= 5) msg = '— −' + lost.toFixed(1) + ' кг уже позади —';
  else if (streak >= 14) msg = '— ' + streak + ' дней подряд без срывов —';
  else if (lost >= 1) msg = '— первые килограммы пошли —';
  else msg = '— на старте пути —';

  const remaining = w ? Math.max(0, w - target).toFixed(1) : '—';

  let html = `
    <div class="header">
      <div class="brand">прогресс</div>
      <h1 class="title">Дорога к 70</h1>
      <div class="divider"></div>
      <div class="subtitle">${escapeHtml(data.name || 'Doniyor')}</div>
    </div>

    <div class="weight-block">
      <div class="weight-value">${w ? w.toFixed(1) : '—'}</div>
      <div class="weight-unit">кг</div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-value accent">${lost.toFixed(1)}</div>
        <div class="stat-label">сброшено · кг</div>
      </div>
      <div class="stat">
        <div class="stat-value">${remaining}</div>
        <div class="stat-label">до цели · кг</div>
      </div>
      <div class="stat">
        <div class="stat-value">${streak}</div>
        <div class="stat-label">серия · дней</div>
      </div>
    </div>
  `;

  if (history.length >= 2) {
    html += `<div class="section-label">Динамика веса</div>
      <div class="chart-wrap">${chartSvg(history, target, start)}</div>`;
  }

  html += `<div class="section-label" style="text-align:center">Уровень ${ROMAN[level-1] || ''} · ${LEVEL_NAMES[level-1] || ''}</div>`;

  if (badges.length > 0) {
    html += `<div class="section-label">Достижения</div>
      <div class="badges-row">
        ${badges.map(b => `<div class="badge-mini">${escapeHtml(b)}</div>`).join('')}
      </div>`;
  }

  html += `<div class="message">${escapeHtml(msg)}</div>
    <div class="updated">обновлено ${updated.toLocaleDateString('ru', { day: 'numeric', month: 'long' })}</div>`;

  document.getElementById('view').innerHTML = html;
}

function chartSvg(history, target, start) {
  const W = 320, H = 140, padX = 18, padY = 14;
  const values = history.map(p => p.w);
  let minVal = target - 1;
  let maxVal = start + 1;
  values.forEach(v => {
    if (v < minVal) minVal = v;
    if (v > maxVal) maxVal = v;
  });
  const range = maxVal - minVal || 1;
  const xStep = history.length > 1 ? (W - padX * 2) / (history.length - 1) : 0;
  const yFor = (v) => H - padY - ((v - minVal) / range) * (H - padY * 2);

  let svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`;
  const ty = yFor(target);
  svg += `<line x1="${padX}" y1="${ty}" x2="${W - padX}" y2="${ty}" stroke="#D4B886" stroke-width="0.5" stroke-dasharray="2,3" />`;
  svg += `<text x="${W - padX}" y="${ty - 5}" fill="#D4B886" font-size="8" text-anchor="end" letter-spacing="1" font-family="Inter">ЦЕЛЬ ${target}</text>`;

  const path = history.map((p, i) => `${i === 0 ? 'M' : 'L'} ${(padX + i * xStep).toFixed(1)},${yFor(p.w).toFixed(1)}`).join(' ');
  svg += `<path d="${path}" fill="none" stroke="#F5EFE6" stroke-width="1.2" />`;
  history.forEach((p, i) => {
    const isLast = i === history.length - 1;
    svg += `<circle cx="${(padX + i * xStep).toFixed(1)}" cy="${yFor(p.w).toFixed(1)}" r="${isLast ? 2.5 : 1.5}" fill="${isLast ? '#D4B886' : '#F5EFE6'}" />`;
  });
  svg += `</svg>`;
  return svg;
}

const data = decodeFragment();
if (data) render(data);
</script>
</body>
</html>
